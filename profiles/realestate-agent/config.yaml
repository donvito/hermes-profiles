# Hermes config for the realestate-agent profile.
# Non-secret settings only — keys live in the profile .env.
# Preserved on `hermes profile update` (pass --force-config to reset).

model:
  provider: "auto"

agent:
  max_turns: 90

skills:
  template_vars: true
  # Default preloaded skills: loaded into every new session as if launched
  # with `hermes -s <skill>` (requires hermes-agent with skills.preload
  # support; older versions ignore this key). Explicit -s flags stack on
  # top; --ignore-rules skips these.
  preload:
    - comp-analysis
    - listing-writer

memory:
  memory_enabled: true

cron:
  wrap_response: true

# Disabled example MCP server — a filesystem mount for transaction folders.
# Enable after adjusting the path, or use `hermes -p realestate-agent mcp`.
mcp_servers:
  deal-files:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "workspace"]
    enabled: false
