# Hermes profile distribution manifest.
# Schema: hermes_cli/profile_distribution.py (DistributionManifest) in hermes-agent.
name: content-creator
version: 0.1.1
description: "Content creator — drafts, LinkedIn and X posting, content calendar"
hermes_requires: ">=0.18.0"
author: "hermes-profiles maintainers"
license: "MIT"

env_requires:
  - name: OPENAI_API_KEY
    description: "OpenAI API key for model access (or run `hermes -p content-creator setup` to pick another provider)"
    required: false
  - name: LINKEDIN_ACCESS_TOKEN
    description: "LinkedIn OAuth access token with openid + w_member_social scopes (for the linkedin-posting skill)"
    required: false
  - name: X_BEARER_TOKEN
    description: "X (Twitter) OAuth 2.0 user-context access token with tweet.write scope (for the x-posting skill)"
    required: false
