# Hermes config for the content-creator profile.
# Non-secret settings only — tokens live in the profile .env
# (LINKEDIN_ACCESS_TOKEN, X_BEARER_TOKEN, model key).
# Preserved on `hermes profile update` (pass --force-config to reset).

model:
  provider: "auto"

agent:
  max_turns: 90

skills:
  template_vars: true
  # Default preloaded skills: loaded into every new session as if launched
  # with `hermes -s <skill>` (requires hermes-agent with skills.preload
  # support; older versions ignore this key). Explicit -s flags stack on
  # top; --ignore-rules skips these.
  preload:
    - linkedin-posting
    - x-posting

memory:
  # Voice, audience, and recurring themes are remembered across sessions.
  memory_enabled: true

cron:
  wrap_response: true
