# Hermes config for the content-creator profile.
# Non-secret settings only — tokens live in the profile .env
# (LINKEDIN_ACCESS_TOKEN, X_BEARER_TOKEN, model key).
# Preserved on `hermes profile update` (pass --force-config to reset).

model:
  provider: "auto"

agent:
  max_turns: 90

skills:
  template_vars: true
  # Preload role skills on every new session (CLI / TUI / gateway / cron).
  # Requires hermes-agent support for skills.defaults (see upstream #52773).
  defaults:
    - linkedin-posting
    - x-posting

memory:
  # Voice, audience, and recurring themes are remembered across sessions.
  memory_enabled: true

cron:
  wrap_response: true
